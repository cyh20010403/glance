name: glance
description: 《回眸》- 基于现实场景的匿名双向心动匹配社交应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # UI
  cupertino_icons: ^1.0.8
  # 网络
  dio: ^5.7.0
  web_socket_channel: ^3.0.1
  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # 路由
  go_router: ^14.6.2
  # 本地存储
  shared_preferences: ^2.3.3
  # 模型
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # 工具
  intl: ^0.19.0
  lottie: ^3.3.3
  share_plus: ^13.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
